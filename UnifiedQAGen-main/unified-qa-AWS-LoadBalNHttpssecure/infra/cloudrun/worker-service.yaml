apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: unifiedqa-web
spec:
  template:
    spec:
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/unifiedqa/web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: https://YOUR_API_DOMAIN