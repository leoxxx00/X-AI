apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: unifiedqa-api
spec:
  template:
    spec:
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/unifiedqa/api:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: YOUR_DATABASE_URL
            - name: REDIS_URL
              value: YOUR_REDIS_URL
            - name: CORS_ORIGINS
              value: https://YOUR_WEB_DOMAIN