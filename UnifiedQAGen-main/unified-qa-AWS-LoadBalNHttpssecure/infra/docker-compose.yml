services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: unifiedqa
      POSTGRES_USER: unifiedqa
      POSTGRES_PASSWORD: unifiedqa
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ../apps/api
    env_file:
      - ../.env
    ports:
      - "8001:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ../apps/worker
    env_file:
      - ../.env
    environment:
      ANONYMIZED_TELEMETRY: "False"
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ../apps/web
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata: